<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow Dashboard — View and manage all your project boards.">
  <title>TaskFlow — Dashboard</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div class="app-layout page-enter">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-left">
        <a href="app.html" class="navbar-logo">
          <div class="navbar-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <span class="navbar-logo-text">Task<span class="text-gradient">Flow</span></span>
        </a>

        <div class="navbar-search">
          <svg class="navbar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="navbar-search-input" type="text" id="search-input" placeholder="Search boards...">
        </div>
      </div>

      <div class="navbar-right">
        <button class="btn btn-primary btn-sm" id="create-board-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Board
        </button>

        <div class="dropdown">
          <div class="navbar-user" id="user-menu-toggle">
            <div class="avatar" id="user-avatar"></div>
            <span class="navbar-user-name" id="user-name"></span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <div class="dropdown-menu" id="user-dropdown">
            <button class="dropdown-item dropdown-item--danger" id="logout-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Log Out
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-main">

      <!-- Greeting -->
      <div class="dashboard-header">
        <h1 class="dashboard-greeting">Good day, <span id="greeting-name"></span> 👋</h1>
        <p class="dashboard-subtitle">Here are your project boards</p>
      </div>

      <!-- Starred Boards -->
      <section class="starred-section" id="starred-section" style="display: none;">
        <div class="section-header">
          <h2 class="section-title">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            Starred
          </h2>
        </div>
        <div class="boards-grid" id="starred-grid"></div>
      </section>

      <!-- All Boards -->
      <section>
        <div class="section-header">
          <h2 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
            </svg>
            All Boards
          </h2>
        </div>
        <div class="boards-grid" id="boards-grid"></div>
      </section>
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>

  <!-- User dropdown toggle -->
  <script>
    document.getElementById('user-menu-toggle')?.addEventListener('click', () => {
      document.getElementById('user-dropdown')?.classList.toggle('active');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#user-menu-toggle') && !e.target.closest('#user-dropdown')) {
        document.getElementById('user-dropdown')?.classList.remove('active');
      }
    });
  </script>
</body>
</html>
